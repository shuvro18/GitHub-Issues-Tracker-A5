<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>


    <!-- daisyUi + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-base-200 h-screen">
    <!-- header section -->
    <header>
        <div class="navbar bg-base-100 shadow-sm flex max-[580px]:flex-col justify-between px-[3%] mx-auto space-y-5">
            <div class="flex ">
                <div class="flex items-center">
                    <img src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button onclick="button('search')" id="search-button" class="btn bg-primary text-white"><span><i
                            class="fa-solid fa-plus"></i></span> New Issue</button>
            </div>
        </div>
    </header>

    <main>
        <!-- 3 buttons  -->
        <section class="flex gap-4 bg-base-100 p-7 rounded-md mt-15 w-10/12 mx-auto">
            <button id="all-button" onclick="button('all')" class="btn btn-primary">All</button>
            <button id="open-button" onclick="button('open')" class="btn">Open</button>
            <button id="closed-button" onclick="button('closed')" class="btn">Closed</button>
        </section>

        <!-- <div>
            <h2 class="font-bold text-xl">Fix broken image uploads</h2>
            <div class="flex items-center gap-3 py-4">
                <button class="btn rounded-full">Opened</button>
                <p class="text-[14px] text-neutral/50">Opened by Fahim Ahmed</p>
                <p class="text-[14px] text-neutral/50">22/02/2026</p>
            </div>
            <div class="flex gap-9 items-center py-5">
                <span class="">bug</span>
                <span class="">ghura</span>
            </div>
            <p class="text-neutral/50 pb-4">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
            <div class="bg-bse-200 p-4 flex gap-39">
                <p>Assignee: <br>
                Fahim Ahmed</p>
                <p>
                    Priority: <br>
                    <span class="btn rounded-full bg-pink-500">High</span>
                </p>
            </div>
        </div> -->


        <!-- all issue section -->

        <section class="bg-base-200">
            <div class="w-10/12 mx-auto bg-base-200">
                <div class="flex items-center justify-between bg-base-100 p-7 mt-3 rounded-lg">
                    <div class="flex gap-3">
                        <img src="./assets/Aperture.png" alt="circle image">
                        <div>
                            <p class="font-bold"><span id="total-number">0</span> Issues</p>
                            <p class="text-neutral/50 text-[14px]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <ul class="flex gap-3">
                        <li><span class=" h-[3px] w-[px] rounded-full bg-green-500 text-green-500">rrrr</span> open</li>
                        <li><span class=" h-[3px] w-[px] rounded-full bg-violet-500 text-violet-500">rrrr</span> closed
                        </li>
                    </ul>
                </div>


                <!-- issue container -->
                <div>
                    <div id="issue-container" class="grid grid-cols-3 max-[500px]:grid-cols-1 max-[850px]:grid-cols-2 grid-flow-dense">


                    </div>
                </div>

                <!-- open container -->
                <div>
                    <div id="open-container" class="grid grid-cols-3 max-[500px]:grid-cols-1 max-[850px]:grid-cols-2 grid-flow-dense hidden">
                        <p>hello</p>
                    </div>
                </div>
                
                
                <!-- closed container -->
                <div>
                    <div id="closed-container" class="grid grid-cols-3 max-[500px]:grid-cols-1 max-[850px]:grid-cols-2 hidden grid-flow-dense">
                        <p>hello</p>
                    </div>
                </div>
                <div id="emty">
                    
                </div>

                <!-- modal section -->
                <div>
                    <!-- Open the modal using ID.showModal() method -->
                    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
                    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                        <div  class="modal-box">
                            <div id="modal-box" class="py-3">

                            </div>

                            <div class="modal-action">
                                <form method="dialog">
                                    <!-- if there is a button in form, it will close the modal -->
                                    <button class="btn">Close</button>
                                </form>
                            </div>
                        </div>
                    </dialog>
                </div>
            </div>

        </section>
    </main>


    <script src="./scripts/home.js"></script>
</body>

</html>
