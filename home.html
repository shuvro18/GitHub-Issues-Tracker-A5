<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>


    <!-- daisyUi + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-base-200 h-screen">
    <!-- header section -->
    <header>
        <div class="navbar bg-base-100 shadow-sm flex max-[580px]:flex-col justify-between px-[3%] mx-auto space-y-5">
            <div class="flex ">
                <div class="flex items-center">
                    <img src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn bg-primary text-white">New Issue</button>
            </div>
        </div>
    </header>

    <main>
        <!-- 3 buttons  -->
        <section class="flex gap-4 bg-base-100 p-7 rounded-md mt-15 w-10/12 mx-auto">
            <button id="all-button" onclick="button('all')" class="btn btn-primary">All</button>
            <button id="open-button" onclick="button('open')" class="btn">Open</button>
            <button id="closed-button" onclick="button('closed')" class="btn">Closed</button>
        </section>
    </main>


    <script src="./scripts/home.js"></script>
</body>

</html>
